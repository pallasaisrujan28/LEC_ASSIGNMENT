name: Deploy Agentic System

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-west-2
  ECR_REPO: lec-agent-backend
  ECS_CLUSTER: lec-agent-cluster
  ECS_SERVICE: lec-agent-backend
  ECS_TASK_FAMILY: lec-agent-backend
  CLOUDFRONT_DIST_ID: ELEWWHZ0YPIZP
  S3_FRONTEND_BUCKET: lec-agent-frontend-866647877267

permissions:
  id-token: write
  contents: read

jobs:
  # ── Step 1: Infrastructure ──────────────────────────────────────────
  infra:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "Agentic System/infra"
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3

      - run: terraform init
      - run: terraform plan -out=tfplan
      - run: terraform apply -auto-approve tfplan

  # ── Step 2: Backend — build, push to ECR, deploy to ECS Fargate ────
  backend:
    name: Deploy Backend
    needs: infra
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "Agentic System/backend"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for backend changes
        id: changes
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q "Agentic System/backend/"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - uses: aws-actions/configure-aws-credentials@v4
        if: steps.changes.outputs.changed == 'true'
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        if: steps.changes.outputs.changed == 'true'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        if: steps.changes.outputs.changed == 'true'
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          IMAGE_URI="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO}:latest"
          docker buildx create --use --name arm64builder 2>/dev/null || true
          docker buildx build --platform linux/arm64 -t $IMAGE_URI --push .

      - name: Register new ECS task definition and update service
        if: steps.changes.outputs.changed == 'true'
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          IMAGE_URI="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO}:latest"

          # Register new task definition with all env vars from secrets
          TASK_DEF=$(cat <<EOF
          {
            "family": "${ECS_TASK_FAMILY}",
            "requiresCompatibilities": ["FARGATE"],
            "networkMode": "awsvpc",
            "cpu": "1024",
            "memory": "2048",
            "executionRoleArn": "${{ secrets.ECS_EXECUTION_ROLE_ARN }}",
            "taskRoleArn": "${{ secrets.ECS_TASK_ROLE_ARN }}",
            "runtimePlatform": {
              "operatingSystemFamily": "LINUX",
              "cpuArchitecture": "ARM64"
            },
            "containerDefinitions": [{
              "name": "backend",
              "image": "${IMAGE_URI}",
              "essential": true,
              "portMappings": [{"containerPort": 8080, "protocol": "tcp"}],
              "logConfiguration": {
                "logDriver": "awslogs",
                "options": {
                  "awslogs-group": "/ecs/lec-agent",
                  "awslogs-region": "${AWS_REGION}",
                  "awslogs-stream-prefix": "backend"
                }
              },
              "environment": [
                {"name": "AWS_REGION", "value": "${AWS_REGION}"},
                {"name": "BEDROCK_MODEL_ID", "value": "${{ secrets.BEDROCK_MODEL_ID }}"},
                {"name": "AGENTCORE_MEMORY_ID", "value": "${{ secrets.AGENTCORE_MEMORY_ID }}"},
                {"name": "AGENTCORE_SUMMARY_STRATEGY_ID", "value": "${{ secrets.AGENTCORE_SUMMARY_STRATEGY_ID }}"},
                {"name": "BEDROCK_GUARDRAIL_ID", "value": "${{ secrets.BEDROCK_GUARDRAIL_ID }}"},
                {"name": "BEDROCK_GUARDRAIL_VERSION", "value": "${{ secrets.BEDROCK_GUARDRAIL_VERSION }}"},
                {"name": "TAVILY_API_KEY", "value": "${{ secrets.TAVILY_API_KEY }}"},
                {"name": "BUDGET_CAP_USD", "value": "20.0"},
                {"name": "LANGCHAIN_TRACING_V2", "value": "true"},
                {"name": "LANGCHAIN_ENDPOINT", "value": "${{ secrets.LANGCHAIN_ENDPOINT }}"},
                {"name": "LANGCHAIN_API_KEY", "value": "${{ secrets.LANGCHAIN_API_KEY }}"},
                {"name": "LANGCHAIN_PROJECT", "value": "LEC-AGENT"}
              ]
            }]
          }
          EOF
          )

          echo "$TASK_DEF" > task-def.json
          NEW_ARN=$(aws ecs register-task-definition --cli-input-json file://task-def.json --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "Registered: $NEW_ARN"

          # Update the ECS service to use the new task definition
          aws ecs update-service \
            --cluster ${ECS_CLUSTER} \
            --service ${ECS_SERVICE} \
            --task-definition "$NEW_ARN" \
            --force-new-deployment \
            --query 'service.serviceName' --output text

          echo "Service updated, deployment in progress"

  # ── Step 3: Frontend — build + deploy to S3 + CloudFront ──────────────
  frontend:
    name: Deploy Frontend
    needs: infra
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "Agentic System/frontend"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for frontend changes
        id: changes
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q "Agentic System/frontend/"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-node@v4
        if: steps.changes.outputs.changed == 'true'
        with:
          node-version: "20"

      - name: Build frontend
        if: steps.changes.outputs.changed == 'true'
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.BACKEND_URL }}
        run: |
          npm ci
          npm run build

      - uses: aws-actions/configure-aws-credentials@v4
        if: steps.changes.outputs.changed == 'true'
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3 + invalidate CloudFront
        if: steps.changes.outputs.changed == 'true'
        run: |
          aws s3 sync out/ s3://${{ env.S3_FRONTEND_BUCKET }}/ --delete
          aws cloudfront create-invalidation --distribution-id ${{ env.CLOUDFRONT_DIST_ID }} --paths "/*"
